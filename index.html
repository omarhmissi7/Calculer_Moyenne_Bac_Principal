    button {
            position: relative;
            font-size: 25px;
            width: 270px;
            height: 270px;
            margin: 15px;
            border-radius: 150px;
            display: inline-block;
            font-weight: 900;
            color: white;
            background: #020617;
            overflow: hidden;
            transition: 800ms;
            opacity: 0;
            transform: translateY(50px) scale(0.9);
            animation: fadeUp 1s ease forwards;
            border: none;
        }

        
        .I{
            padding-left: 5px;
        }


        button::before {
            content: "";
            position: absolute;
            inset: -5px;
            border-radius: 150px;
            background: linear-gradient(270deg, #000000, #2f2fad, #2949d7,hotpink);
            background-size: 400% 400%;
            z-index: -3;
            border: none;
            animation: borderMove 9s linear infinite;
        }


        button::after {
            content: "";
            position: absolute;
            inset: 4px;
            background: #020617;
            border-radius: 150px;
            z-index: -1;
            border: none;
        }
        button::after:hover{
            transform: scale(1.1) translateY(10px);
        }
        button:active{
            transform: scale(1.1);
        }


        /* Hover */


        /* Animation */
        @keyframes borderMove {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 400% 50%;
            }
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Delay effect */
        button:nth-child(1) {
            animation-delay: 0.2s;
        }

        button:nth-child(2) {
            animation-delay: 0.4s;
        }

        button:nth-child(3) {
            animation-delay: 0.6s;
        }

        button:nth-child(4) {
            animation-delay: 0.8s;
        }

        button:nth-child(5) {
            animation-delay: 1s;
        }

        button:nth-child(6) {
            animation-delay: 1.2s;
        }
