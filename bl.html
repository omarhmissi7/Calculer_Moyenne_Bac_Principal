<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bac Lettre</title>
    <link rel="icon" href="logo.jpg">

</head>
<link rel="stylesheet" href="style.css">
<style>
    body {
        padding: 0;
        margin: 0;
    }

    input {
        margin: 0;

    }

    img {
        width: 150px;
        height: 150px;
        margin: 0 auto;
        width: fit-content;
    }

    #container {
        text-align: center;
        display: inline-block;

    }

    .divinput {
        display: flex;
        gap: 30px;

        margin-bottom: 40px;
        margin-top: 40px;
    }
    #ar,#option,#philo{
        margin-right: 0;
    }
    .div1 input , .div2 input {
        margin-bottom: 30px;
    }
    .div1{
        margin-right: 100px;
    }
    .div2{
        margin-left: 100px;
    }
</style>

<body>
    <center>
        <legend align="center">Calculer moyenne bac Lettres</legend><br>
        <img src="open-book.png" alt=""><br><br>
    </center>





    <center>
        <div id="container">

            <div class="divinput">
                <div class="div1">
                    <input type="number" name="" id="ar" max="20" min="0" placeholder="Arabe"><br>
                    <input type="number" name="" id="hisgeo" max="20" min="0" placeholder="his-geo"><br>
                    <input type="number" name="" id="en" max="20" min="0" placeholder="Anglais"><br>
                    <input type="number" name="" id="sport" max="20" min="0" placeholder="Sport"><br>



                </div>
                <div class="div2">

                    <input type="number" name="" id="fr" max="20" min="0" placeholder="Français"><br>
                    <input type="number" name="" id="isl" max="20" min="0" placeholder="p. islamique"><br>
                    <input type="number" name="" id="philo" max="20" min="0" placeholder="Philosophie"><br>
                    <input type="number" name="" id="option" max="20" min="0" placeholder="Option"><br>

                </div>


            </div>
        </div><br>

        <input type="number" name="" id="info" max="20" min="0" placeholder="Informatique"><br>

        <button onclick="calcbm()">
            CALCULER MOYEN
        </button><br><br><br><br>
        <div>
            <span style="color: white;
                font-weight: 900;
                font-family: 'arial black';
                font-size: 25px;
            ">Votre Moyenne Est : </span><br><br>
            <div id="divv">
                00.00
            </div>
            <span style="color: white;
                font-weight: 900;
                font-family: 'arial black';
                font-size: 25px;
                text-transform: capitalize;
            ">votre score est : </span><br><br>
            <div id="score">

            </div>
        </div>
    </center>


</body>
<script>


    function calcbm() {

        let ar = parseFloat(document.getElementById("ar").value) || 0;
        let fr = parseFloat(document.getElementById("fr").value) || 0;
        let hisgeo = parseFloat(document.getElementById("hisgeo").value) || 0;
        let isl = parseFloat(document.getElementById("isl").value) || 0;

        let en = parseFloat(document.getElementById("en").value) || 0;
        let philo = parseFloat(document.getElementById("philo").value) || 0;
        let sport = parseFloat(document.getElementById("sport").value) || 0;
        let option = parseFloat(document.getElementById("option").value) || 0;
        let info = parseFloat(document.getElementById("info").value) || 0;

        let moy;
        if (option > 10) {
            let new_ = option - 10;
            moy = (ar * 3 + fr * 3 + en * 3 + hisgeo * 2 + isl * 1 + philo * 3 + sport + new_ + info) / 17;
        } else {
            moy = (ar * 3 + fr * 3 + en * 3 + hisgeo * 2 + isl * 1 + philo * 3 + sport + info) / 17;
        }
        let score = 4*moy + 1.5*en + philo*1.5 + hisgeo + fr + en;
        let div = document.getElementById("divv");
        div.innerHTML = moy.toFixed(2);
        document.getElementById("score").innerHTML = score.toFixed(2);

    }






</script>

</html>
