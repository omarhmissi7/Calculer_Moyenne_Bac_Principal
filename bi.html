<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>Bac Informatique</title>
</head>
<link rel="stylesheet" href="style.css">
<style>
    
</style>
    <body>
    <center>
        
            <legend align="center">Calculer moyenne bac Info</legend>
       
        <fieldset>
            <div>
                <input type="number" name="" id="ar" max="20" min="0" placeholder="Arabe">
                <input type="number" name="" id="fr" max="20" min="0" placeholder="Français"><br>
                <input type="number" name="" id="math" max="20" min="0" placeholder="Math">
                <input type="number" name="" id="sti" max="20" min="0" placeholder="Sti"><br>
                <input type="number" name="" id="ph" max="20" min="0" placeholder="Physique">
                <input type="number" name="" id="en" max="20" min="0" placeholder="Anglais"><br>
                <input type="number" name="" id="philo" max="20" min="0" placeholder="Philosophie">
                <input type="number" name="" id="sport" max="20" min="0" placeholder="Sport"><br>
                <input type="number" name="" id="option" max="20" min="0" placeholder="Option">
                <input type="number" name="" id="prog" max="20" min="0" placeholder="Programmation"><br>

            </div>
        </fieldset>
        <button onclick="calcbi()">
            CALCULER MOYEN
        </button><br><br><br><br>
        <div id="divv">
            00.00
        </div>
        
     </center>
</body>
<script>
    
    
        function calcbi(){

            let ar = parseFloat(document.getElementById("ar").value) || 0;
            let fr = parseFloat(document.getElementById("fr").value) || 0;
            let math = parseFloat(document.getElementById("math").value) || 0;
            let sti = parseFloat(document.getElementById("sti").value) || 0;
            let ph = parseFloat(document.getElementById("ph").value) || 0;
            let en = parseFloat(document.getElementById("en").value) || 0;
            let philo = parseFloat(document.getElementById("philo").value) || 0;
            let sport = parseFloat(document.getElementById("sport").value) || 0;
            let option = parseFloat(document.getElementById("option").value) || 0;
            let prog = parseFloat(document.getElementById("prog").value) || 0;

            let moy = (ar + fr + en + math*3 + sti*3 + ph*4 + philo + sport + option + prog*3) / 19;
            let div = document.getElementById("divv");
            div.innerHTML= moy.toFixed(2);
            
        }


    



</script>
</html>
